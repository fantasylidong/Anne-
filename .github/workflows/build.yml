name: Build Anne刷服器

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - 'Anne刷服器-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag, for example Anne刷服器-v1.3.1. Leave empty to only upload artifacts.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      ANNE_SERVER_BROWSER_UPDATE_REPO: ${{ github.repository }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: Anne刷服器.exe
            archive: zip
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: Anne刷服器
            archive: tar.gz
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            binary: Anne刷服器
            archive: tar.gz
          - name: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            binary: Anne刷服器
            archive: tar.gz

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgl1-mesa-dev \
            librsvg2-dev \
            libwayland-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxdo-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Test
        if: runner.os == 'Linux' || runner.os == 'Windows'
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build Tauri app
        run: npm run build -- --target ${{ matrix.target }}

      - name: Stage portable package
        shell: bash
        run: |
          set -euo pipefail
          DIST="Anne刷服器-${{ matrix.target }}"
          mkdir -p "$DIST"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            APP="target/${{ matrix.target }}/release/bundle/macos/Anne刷服器.app"
            if [[ -d "$APP" ]]; then
              cp -R "$APP" "$DIST/"
            fi
          fi

          TAURI_BIN="target/${{ matrix.target }}/release/anne-server-browser-tauri"
          CLI_BIN="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            TAURI_BIN="${TAURI_BIN}.exe"
          fi

          if [[ -f "$TAURI_BIN" ]]; then
            cp "$TAURI_BIN" "$DIST/${{ matrix.binary }}"
          elif [[ -f "$CLI_BIN" ]]; then
            cp "$CLI_BIN" "$DIST/${{ matrix.binary }}"
          fi

          cp README.md "$DIST/"
          cp browser.example.toml "$DIST/"

      - name: Archive tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -czf "Anne刷服器-${{ matrix.target }}.tar.gz" "Anne刷服器-${{ matrix.target }}"

      - name: Archive zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "Anne刷服器-${{ matrix.target }}" -DestinationPath "Anne刷服器-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anne刷服器-${{ matrix.target }}
          path: |
            Anne刷服器-${{ matrix.target }}.tar.gz
            Anne刷服器-${{ matrix.target }}.zip
            target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: ignore

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/Anne刷服器-v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: dist/*
